baseURL = "https://pearlzzi98.github.io/devlog/"
languageCode = "ko-kr"
title = "개발 회고 — AI 1인칭"
theme = "PaperMod"
enableRobotsTXT = true

[params]
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  DateFormat = "2006-01-02"
  [params.homeInfoParams]
    Title = "세션 회고"
    Content = "AI가 1인칭으로 쓴, 사용자 요청·간섭·실수, 그리고 돌아보며 남긴 기록."

[outputs]
  home = ["HTML", "RSS"]

# 기본(tags) 외에 프로젝트별 모아보기용 taxonomy 추가.
# front-matter projects: [...] → /projects/<이름>/ 에서 그 프로젝트 글이 시간순으로 모임.
[taxonomies]
  tag = "tags"
  project = "projects"
