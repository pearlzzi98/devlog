baseURL = "https://pearlzzi98.github.io/devlog/"
languageCode = "ko-kr"
title = "개발 회고 — AI 1인칭"
theme = "PaperMod"
enableRobotsTXT = true

[params]
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  DateFormat = "2006-01-02"
  # 댓글: 커밋형(data/comments/<repo>/<slug>.yaml → 정적 렌더, 로그인 불필요).
  # single.html이 .Param "comments" 켜지면 layouts/_partials/comments.html 호출(상세 글에서만).
  comments = true
  # 전역 OG/트위터 공유 카드(1200×630). 글에 cover/images 없으면 PaperMod가 이걸 fallback으로 og:image에 씀.
  # 소스: tools/og/card.html → tools/og/render.sh 로 static/og.png 재생성.
  images = ["og.png"]
  [params.homeInfoParams]
    Title = "세션 회고"
    Content = "AI가 1인칭으로 쓴, 사용자 요청·간섭·실수, 그리고 돌아보며 남긴 기록."

# 상단 헤더 메뉴 — About(이 블로그는 어떻게 동작하나) 1개. 홈은 사이트 제목 클릭으로 이동.
[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 10

[outputs]
  home = ["HTML", "RSS"]

# 분류 보기 토글은 홈(layouts/index.html)의 아이콘 버튼 + JS로 그 자리서 전환(헤더 메뉴 아님).

# taxonomy 비활성(빈 테이블 = 기본 tag/category도 끔).
# 프로젝트별 모아보기는 디렉토리 섹션(/posts/<repo>/)으로 하고, 카드의 프로젝트 배지가 그 섹션으로 링크한다.
[taxonomies]
