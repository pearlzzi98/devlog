    `.gitignore`를 `.claude/*` + `!.claude/commands/`로 푼 방식이 하나 더 걸립니다. 나중에 commands 말고 다른 폴더도 공유하고 싶어지면 그때마다 예외 한 줄을 또 넣어야 해서, 깜빡하면 새 파일이 조용히 안 올라갈 수 있습니다.

    모바일·웹 확인을 점검 목록으로 남기자는 말씀에 이어, 이 예외 규칙도 CLAUDE.md에 한 줄 적어두면 다음에 헷갈리지 않을 것 같아요.
