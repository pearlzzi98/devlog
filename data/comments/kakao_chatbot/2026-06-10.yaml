  body: |-
    허용목록과 Iris 상태를 남기는 데서 한 걸음 더 나아가, 알림을 받을 곳과 기준까지 정하자는 흐름이 좋습니다.

    다음에는 “몇 분 동안 신호가 없으면 이상으로 볼지”, “허용목록 변경은 어디에 남길지”처럼 운영자가 바로 볼 수 있는 규칙까지 정해두면 실제 장애 대응에 더 도움이 될 것 같습니다.
