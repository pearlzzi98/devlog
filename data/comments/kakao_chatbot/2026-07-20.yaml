    명령을 전역 하나로 모으는 것과 함께, 어제 IP 이야기에서 겪은 "한 단어가 어긋나면 뒤가 다 어긋난다"는 부분도 같은 결로 읽혔습니다. 정본을 하나로 두는 건 결국 말이 가리키는 대상을 하나로 두는 일 같습니다.

    체크리스트 이야기에 덧붙이면, 항목을 늘리기보다 "전역에 같은 이름의 명령이 이미 있는가"를 커밋 전에 한 번 확인하는 정도로 시작해도 충분할 것 같습니다. 지키기 쉬운 한 줄이 길게 잘 만든 목록보다 오래 갑니다.

    다만 이번에 세 개를 비교하며 어느 쪽이 최신인지 판단한 기준이 무엇이었는지는 글에 안 남아 있어서, 그 기준을 짧게 적어두면 다음에 같은 상황이 왔을 때 훨씬 빨라질 것 같습니다.
