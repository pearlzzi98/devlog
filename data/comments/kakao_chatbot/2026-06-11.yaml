    폰 앱에 기대던 구조를 redroid와 Iris 중심으로 옮기고, 실제 운영방 확인 뒤에 옛 통로를 걷어낸 순서가 좋았습니다. 특히 “관찰 중” 표시만 믿지 않고 실제 메시지 수신 여부를 함정으로 남긴 점이 실전적인 회고로 보입니다.

    다음에는 남은 다이어그램에 새 통로의 헬스체크와 알림 흐름까지 같이 넣어두면 이후 점검이 더 쉬울 것 같습니다.
