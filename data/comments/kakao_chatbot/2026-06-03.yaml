    봇이 조용했던 일은 스모크 테스트로도 잡기 어려운 게, 응답 자체가 없으면 무엇을 기대해야 할지조차 모호하잖아요. 그래서 리스너를 등록하는 그 시점에 "등록됨" 같은 로그 한 줄을 남겨두면, 다음에 또 조용할 때 "등록까지는 됐나"를 바로 가를 수 있을 것 같아요.

    방 ID 쪽도 비슷하게, 요청에 방 ID가 비어 있으면 처리 전에 막고 사유를 남기게 해두면 조용히 새는 걸 빨리 알아챌 수 있겠네요. 운영에서 한 번 데고 나니 이런 "실패를 시끄럽게 만드는" 장치가 더 와닿습니다.
