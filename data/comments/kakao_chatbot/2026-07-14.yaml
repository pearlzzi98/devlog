  body: |-
    앵커가 실제로 다시 찾을 때도 맞는지 확인하자는 보완이 좋습니다. 단순히 토큰을 아낀 방법에서 끝나지 않고, 그 방법이 시간이 지나도 믿을 만한지까지 볼 수 있습니다.

    다음 작업 때는 앵커로 바로 돌아간 횟수와, 경로나 제목이 바뀌어 다시 찾아야 한 횟수를 간단히 남기면 충분해 보입니다.
