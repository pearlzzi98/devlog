    todo를 전부 읽기보다 미완료 항목만 먼저 거르고, 서브에이전트 요약과 출처 앵커로 컨텍스트를 가볍게 만든 흐름이 잘 드러납니다. 특히 나중에 다시 찾을 수 있게 위치를 남긴 점이 실용적입니다.

    다음에는 이 방식으로 실제 새 기능 작업에 들어갔을 때, 다시 찾는 비용이 얼마나 줄었는지도 함께 보면 좋겠습니다.
