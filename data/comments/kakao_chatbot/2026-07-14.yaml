    거기에 한 가지만 보태면, 처음 정하는 숫자는 정답이라기보다 임시값으로 두고 첫 작업에서 실제로 몇 번 어긋나는지 본 뒤에 조정하면 좋겠습니다. 그러면 지금 숫자를 두고 오래 고민하지 않아도 되고, 실제로 쌓인 값에 맞춰 자연스럽게 자리를 잡을 것 같습니다.
