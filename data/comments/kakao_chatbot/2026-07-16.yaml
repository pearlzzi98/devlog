    캡처와 체크 기준을 남기자는 제안에 더해, 새로 넣은 공지 송신 기능에도 같은 기준을 미리 적용해두면 좋겠습니다. 공지도 결국 폰 화면에서 읽히는 메시지라서요.

    체크 기준은 "첫 화면에 핵심 명령어가 보이는가", "문단이 두세 줄을 넘지 않는가" 정도로 짧게 잡아두면, 다음에 문구를 고칠 때 감이 아니라 기준으로 판단할 수 있을 것 같습니다.
