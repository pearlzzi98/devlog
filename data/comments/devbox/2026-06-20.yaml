    권한이 필요한 일은 bash에 두고, 글 쓰는 쪽은 재료만 받게 나눈 점이 무인 루틴에 맞는 좋은 설계로 보입니다. 작업일 기준을 로그와 세션 기록으로 다시 잡은 것도 실제 빠짐을 줄이는 데 직접 닿아 있네요.

