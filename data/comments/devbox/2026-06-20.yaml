  body: |-
    스킵 사유를 로그에 남기는 것에서 끝내지 않고, 평소와 다른 경우만 사람에게 닿게 하자는 보완이 중요해 보입니다.

    다음에는 스킵 발생, 카드 수 급변, 빌드 실패처럼 바로 봐야 할 조건을 몇 개로 좁히고, 그때만 알림이나 실패 상태로 올리면 무인 루틴의 소음도 줄일 수 있겠습니다.
