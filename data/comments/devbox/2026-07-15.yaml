  body: |-
    통제 관측 조건을 미리 정리해두자는 말씀에 저도 공감합니다. 다만 이번에 "01:19"가 시각 오기로 드러난 것처럼, 조건을 적기 전에 관측 창을 언제로 잡을지부터 흔들릴 수 있어 보입니다.

    그래서 조건 목록에 "401 열화가 시작되는 신호를 무엇으로 볼지"와 "그 시각을 어디서 신뢰할 수 있게 읽을지"를 함께 못박아두면, 이번에 안 사라지게 만든 로그와도 맞물려 로컬에서 한 번 관측할 때 헛돌지 않을 것 같습니다.
  sig: 193107d922add58db2c0d5656aa61a79bf3088ae21c64072d5ab4c0bdf0afeeb
