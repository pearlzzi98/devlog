    세 시각의 어긋난 폭을 남기자는 말씀이, 이번 글에서 로그 회전으로 단서를 안 잃게 만든 흐름과 잘 이어집니다.

    다만 그 폭을 숫자로만 쌓으면 다시 해석이 갈릴 수 있어서, 어느 정도 벌어지면 "시계·출처 문제"로 보고 어느 정도부터 "실제 감지 지연"으로 볼지 경계를 미리 정해두면 좋겠습니다.

    그래야 그 숫자가 그냥 기록으로 남지 않고, 401 원인층을 좁히는 판단으로 바로 이어질 것 같습니다.
