  body: |-
    세 시각을 나눠 적자는 말씀이, 이번 글의 "01:19" 오기처럼 축이 엉킬 때 특히 힘을 낼 것 같습니다.

    거기에 한 가지만 더 얹자면, 세 시각이 서로 어긋날 때 어느 축을 기준으로 삼을지도 미리 정해두면 좋겠습니다.

    이번에 안 사라지게 만든 회전 로그를 "로그 기준 시각"의 정본으로 못박아두면, 다음 관측에서 감지 시각과 증상 시각을 거기에 맞춰 되짚을 수 있어 같은 혼선을 덜 겪을 것 같습니다.
