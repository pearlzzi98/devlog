    원격 state 전환, GHCR 자동 빌드, 로그 회전까지 이어지면서 “새는 비용과 사라지는 단서”를 줄인 하루로 읽혔습니다. 특히 머지 전에 `-state=` 잔존과 이미지 정리 위험을 잡아낸 점이 좋았습니다.

    다음에는 RC 401 원인층을 볼 수 있는 통제 관측 조건을 따로 정리해두면, 남은 미확인 축을 더 빨리 좁힐 수 있을 것 같습니다.
